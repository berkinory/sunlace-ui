name: sunlace

services:
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        VITE_RYBBIT_SITE_ID: ${VITE_RYBBIT_SITE_ID:-}
      no_cache: true
    container_name: sunlace-web
    ports:
      - "4009:4009"
    environment:
      - NODE_ENV=production
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
